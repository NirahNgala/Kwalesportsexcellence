<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .col-md-3 {
            width: 25%;
            padding: 15px;
            box-sizing: border-box;
        }

        .col-sm-6 {
            width: 50%;
            padding: 15px;
            box-sizing: border-box;
        }

        .our-team {
            text-align: center;
            margin-bottom: 100px;
            z-index: 1;
            position: relative;
        }

        .our-team .pic {
            border-radius: 50%;
            overflow: hidden;
            position: relative;
        }

        .our-team .pic:after {
            content: "";
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease;
        }

        .our-team:hover .pic:after {
            opacity: 1;
        }

        .our-team .pic img {
            width: 100%;
            height: auto;
            display: block;
        }

        .our-team .social {
            width: 100%;
            padding: 0;
            margin: 0;
            list-style: none;
            opacity: 0;
            position: absolute;
            top: 45%;
            left: 0;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        .our-team:hover .social {
            opacity: 1;
        }

        .our-team .social li {
            display: inline-block;
        }

        .our-team .social li a {
            display: block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            border-radius: 50%;
            border: 1px solid #fff;
            font-size: 15px;
            color: #fff;
            margin-right: 10px;
            transition: all 0.5s ease;
        }

        .our-team .social li a:hover {
            background: #fff;
            color: #000;
        }

        .our-team .team-content {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dotted #ddd;
            position: absolute;
            bottom: auto;
            transform: translateY(100%);
            z-index: -1;
            transition: transform 0.5s ease, border 0.5s ease;
        }

        .our-team:hover .team-content {
            transform: translateY(0);
            border: 2px dotted #00adae;
        }

        .our-team .team-info {
            width: 100%;
            color: #464646;
            position: absolute;
            bottom: 12px;
            left: 0;
        }

        .our-team .title {
            font-size: 20px;
            font-weight: 600;
            color: #464646;
            margin: 0 0 5px 0;
            transition: color 0.5s ease;
        }

        .our-team:hover .title {
            color: #00adae;
        }

        .our-team .post {
            display: block;
            font-size: 14px;
            color: #464646;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .col-md-3 {
                width: 50%;
            }
        }

        @media (max-width: 480px) {
            .col-md-3 {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-3 col-sm-6">
                <div class="our-team">
                    <figure class="pic">
                        <img src="assets/diana.webp" alt="Diana, Team Member">
                        <ul class="social">
                            <li><a href="#" class="fab fa-facebook" aria-label="Facebook profile"></a></li>
                            <li><a href="#" class="fab fa-twitter" aria-label="Twitter profile"></a></li>
                            <li><a href="#" class="fab fa-google-plus" aria-label="Google Plus profile"></a></li>
                            <li><a href="#" class="fab fa-linkedin" aria-label="LinkedIn profile"></a></li>
                        </ul>
                    </figure>
                    <div class="team-content">
                        <div class="team-info">
                            <h3 class="title">Williamson</h3>
                            <span class="post">Web Developer</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3 col-sm-6">
                <div class="our-team">
                    <figure class="pic">
                        <img src="assets/diana.webp" alt="Kristiana, Team Member">
                        <ul class="social">
                            <li><a href="#" class="fab fa-facebook" aria-label="Facebook profile"></a></li>
                            <li><a href="#" class="fab fa-twitter" aria-label="Twitter profile"></a></li>
                            <li><a href="#" class="fab fa-google-plus" aria-label="Google Plus profile"></a></li>
                            <li><a href="#" class="fab fa-linkedin" aria-label="LinkedIn profile"></a></li>
                        </ul>
                    </figure>
                    <div class="team-content">
                        <div class="team-info">
                            <h3 class="title">Kristiana</h3>
                            <span class="post">Web Designer</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
