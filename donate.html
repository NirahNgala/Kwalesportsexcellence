<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate - Kwale Sports Excellence</title>

  <!-- FontAwesome CDN for icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }

    /* Header Section */
    header {
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    header .logo img {
      height: 70px;
    }

    header h1 {
      font-size: 24px;
    }

    /* Main Section */
    main {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .donate-page {
      max-width: 700px;
      background-color: #fff;
      padding: 40px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      text-align: center;
      position: relative;
    }

    .donate-page h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .donate-page p {
      font-size: 16px;
      margin-bottom: 30px;
    }

    /* Secure Donation Section */
    .secure-donation h3 {
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .secure-donation i {
      font-size: 24px;
      margin-right: 10px;
      color: #28a745;
    }

    .amount-options {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .amount {
      background-color: #ff6f61;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .amount:hover {
      background-color: #e55b50;
    }

    #custom-amount {
      padding: 15px;
      width: 100%;
      font-size: 18px;
      border-radius: 5px;
      border: 1px solid #ddd;
      margin-top: 20px;
    }

    /* Payment Method Section */
    .payment-method h3 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .payment-options {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .payment-button {
      padding: 15px 25px;
      background-color: #007bff;
      color: white;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .payment-button:hover {
      background-color: #0056b3;
    }

    /* Donate Button */
    .donate-now {
      text-align: center;
    }

    #donate-now-btn {
      background-color: #ff6f61;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s ease;
    }

    #donate-now-btn:hover {
      background-color: #e55b50;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      background-color: #fff;
      border-top: 1px solid #ddd;
    }

    /* Donation Type Section */
    .donation-type {
      margin-bottom: 30px;
    }

    .donation-type label {
      margin-right: 15px;
    }
  </style>
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="logo">
      <img src="assets/kwalesportslogo.jpg" alt="Logo">
    </div>
    <h1>Kwale Sports Excellence</h1>
  </header>

  <!-- Main Content Section -->
  <main class="donate-page">
    <div class="container">
      <h2>Support Our Mission</h2>
      <p>Your generous donations help us provide opportunities for youth through sports and community programs. Every contribution counts!</p>
      
      <!-- Donation Type Section -->
      <section class="donation-type">
        <label for="once">
          <input type="radio" name="donation-type" id="once" value="once" checked> Give Once
        </label>
        <label for="monthly">
          <input type="radio" name="donation-type" id="monthly" value="monthly"> Give Monthly
        </label>
      </section>
      
      <!-- Secure Donation Section -->
      <section class="secure-donation">
        <h3><i class="fas fa-lock"></i> Secure Donation</h3>
        <div class="amount-options">
          <button class="amount" data-amount="10">$10</button>
          <button class="amount" data-amount="25">$25</button>
          <button class="amount" data-amount="50">$50</button>
          <button class="amount" data-amount="100">$100</button>
          <input type="number" id="custom-amount" placeholder="Enter Custom Amount" />
        </div>
      </section>

      <section class="payment-method">
        <h3>Choose Payment Method</h3>
        <div class="payment-options">
          <button class="payment-button" id="credit-card">Credit Card</button>
          <button class="payment-button" id="paypal">PayPal</button>
        </div>
      </section>

      <!-- Donate Now Button -->
      <div class="donate-now">
        <button id="donate-now-btn">Donate Now</button>
      </div>

    </div>
  </main>

  <!-- Footer Section -->
  <footer>
    <p>&copy; 2025 Kwale Sports Excellence</p>
  </footer>

  <script>
    // Function to switch between Donate Once and Monthly
    document.querySelectorAll('input[name="donation-type"]').forEach(input => {
      input.addEventListener('change', function() {
        const donateButton = document.getElementById('donate-now-btn');
        const customAmountInput = document.getElementById('custom-amount');
        
        // If "Give Monthly" is selected, change button text
        if (this.value === 'monthly') {
          donateButton.textContent = 'Donate Monthly';
          customAmountInput.value = ''; // Clear the custom amount field
        } else {
          donateButton.textContent = 'Donate Now';
        }
      });
    });
  </script>

</body>
</html>
